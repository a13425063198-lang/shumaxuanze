<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数码推荐</title>
<style>
:root {
--primary: #3b82ff;
--dark-bg: #0f172a;
--card-bg: #1e2942;
--input-bg: #273450;
--reset-btn: #2a3755;
--clear-btn: #312340;
--text-white: #ffffff;
--text-gray: #b8c8f0;
--radius: 16px;
--btn-radius: 12px;
}
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}
body {
min-height: 100vh;
padding: 16px;
color: var(--text-white);
background: var(--dark-bg);
}
body::before {
content: '';
position: fixed;
top: 0;
left: 0;
width: 100vw;
height: 100vh;
z-index: -2;
background: linear-gradient(45deg,#0a1028,#142250,#0f1838,#1e2b60,#0a1028);
background-size: 1200% 1200%;
animation: bgFlow 8s ease infinite alternate;
}
@keyframes bgFlow {
0%{background-position:0% 0%}
100%{background-position:100% 100%}
}
.container {
max-width: 600px;
margin: 0 auto;
background: rgba(15, 23, 42, 0.85);
backdrop-filter: blur(16px);
border-radius: var(--radius);
padding: 30px 24px;
box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.header {
text-align: center;
margin-bottom: 30px;
padding-bottom: 20px;
border-bottom: 1px solid rgba(255,255,255,0.1);
}
h1 {
font-size: 26px;
margin-bottom: 10px;
color: var(--text-white);
}
.subtitle {
font-size: 15px;
color: var(--text-gray);
}
.tip-bar {
width: 100%;
padding: 14px;
background: var(--input-bg);
border-radius: var(--btn-radius);
margin-bottom: 16px;
border-left: 4px solid var(--primary);
color: var(--text-white);
}
.filter {
display: flex;
flex-direction: column;
gap: 16px;
}
input, select {
width: 100%;
padding: 14px 16px;
background: var(--input-bg);
border: none;
border-radius: var(--btn-radius);
color: var(--text-white);
font-size: 15px;
appearance: none;
}
input::placeholder, select {
color: var(--text-gray);
}
.price-row {
display: flex;
gap: 12px;
align-items: center;
}
.price-input {
flex: 1;
}
.price-sep {
color: var(--text-gray);
}
.btn-row {
display: flex;
gap: 12px;
margin-top: 8px;
}
.search-btn {
flex: 1;
padding: 14px;
border: none;
border-radius: var(--btn-radius);
background: var(--primary);
color: white;
font-size: 15px;
font-weight: 600;
}
.reset-btn {
flex: 1;
padding: 14px;
border: none;
border-radius: var(--btn-radius);
background: var(--reset-btn);
color: white;
font-size: 15px;
}
.clear-btn {
flex: 1;
padding: 14px;
border: none;
border-radius: var(--btn-radius);
background: var(--clear-btn);
color: #ffb0b0;
font-size: 15px;
}
.sort-row {
display: flex;
gap: 10px;
justify-content: center;
margin-top: 12px;
}
.sort-btn {
padding: 10px 22px;
border: none;
border-radius: var(--btn-radius);
background: var(--input-bg);
color: white;
font-size: 14px;
}
.sort-btn.active {
background: var(--primary);
}
.result-count {
margin: 20px 0 12px;
color: var(--text-gray);
font-size: 13px;
}
.phone-list {
display: flex;
flex-direction: column;
gap: 12px;
}
.phone-item {
background: var(--card-bg);
border-radius: var(--btn-radius);
padding: 16px;
}
.brand-tag {
display: inline-block;
padding: 3px 8px;
background: rgba(59,130,255,0.15);
color: var(--primary);
border-radius: 4px;
font-size: 11px;
margin-bottom: 6px;
}
.phone-name {
font-size: 16px;
font-weight: 600;
margin-bottom: 4px;
}
.phone-price {
color: #ff7a7a;
font-size: 18px;
font-weight: 600;
margin-bottom: 6px;
}
.phone-spec {
font-size: 13px;
color: var(--text-gray);
line-height: 1.5;
}
.modal {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.7);
display: none;
justify-content: center;
align-items: center;
padding: 20px;
z-index: 999;
}
.modal-content {
width: 100%;
max-width: 480px;
background: var(--card-bg);
border-radius: var(--radius);
padding: 24px;
}
.modal-price {
color: #ff7a7a;
font-size: 22px;
margin: 12px 0;
font-weight: 600;
}
.modal-spec {
background: var(--input-bg);
padding: 12px;
border-radius: 8px;
margin: 10px 0;
}
.history-box {
display: flex;
flex-wrap: wrap;
gap: 6px;
margin-top: 4px;
}
.history-item {
background: var(--input-bg);
padding: 4px 8px;
border-radius: 6px;
font-size: 12px;
cursor: pointer;
}
.no-result {
text-align: center;
padding: 30px;
color: var(--text-gray);
}
</style>
</head>
<body>

<div class="header">
<h1>📱 大湿数码推荐</h1>
<p class="subtitle">二手手机智能筛选平台</p>
</div>
<div class="tip-bar" id="tipBar">加载中...</div>
<div class="filter">
<input type="text" id="keyword" placeholder="搜索手机型号或配置...">
<div class="history-box" id="historyBox"></div>
<select id="brand">
<option value="全部">所有品牌</option>
<option value="小米">小米</option>
<option value="红米">红米</option>
<option value="一加">一加</option>
<option value="OPPO">OPPO</option>
<option value="vivo">vivo</option>
<option value="苹果">苹果</option>
<option value="魅族">魅族</option>
<option value="华为">华为</option>
</select>

<input type="number" class="price-input" id="minPrice" placeholder="最低价">
